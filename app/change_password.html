<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Good Bot – Change Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px 24px 20px;
      width: 100%;
      max-width: 420px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.3rem;
    }
    p {
      margin: 0 0 18px;
      font-size: 0.9rem;
      color: #6b7280;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.85rem;
      color: #374151;
    }
    input[type="password"] {
      width: 100%;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 8px 11px;
      font-size: 0.9rem;
      margin-bottom: 10px;
      background: #f9fafb;
    }
    button {
      width: 100%;
      border-radius: 999px;
      border: none;
      padding: 9px 0;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover {
      background: #1d4ed8;
    }
    #message {
      margin-top: 10px;
      font-size: 0.85rem;
      min-height: 18px;
    }
    #message.error { color: #b91c1c; }
    #message.success { color: #166534; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Change Password</h1>
    <p>
      Enter your current password and choose a new one.
      You’ll use this new password next time you log in.
    </p>
    <form id="change-form">
      <label for="current">Current password</label>
      <input id="current" type="password" required />

      <label for="new">New password</label>
      <input id="new" type="password" required />

      <label for="confirm">Confirm new password</label>
      <input id="confirm" type="password" required />

      <button type="submit">Update password</button>
    </form>
    <div id="message"></div>
  </div>

  <script>
    const API_BASE = "";


    function getSession() {
      const token = localStorage.getItem("accessToken");
      const type = localStorage.getItem("tokenType") || "Bearer";
      const expiry = localStorage.getItem("accessTokenExpiry");
      return { token, type, expiry: expiry ? Number(expiry) : null };
    }

    function requireAuth() {
      const { token, expiry } = getSession();
      if (!token || !expiry || Date.now() >= expiry) {
        localStorage.clear();
        window.location.href = "/";

      }
    }

    requireAuth();

    document.getElementById("change-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      requireAuth();

      const current = document.getElementById("current").value;
      const next = document.getElementById("new").value;
      const confirm = document.getElementById("confirm").value;
      const messageEl = document.getElementById("message");
      messageEl.textContent = "";
      messageEl.className = "";

      if (next !== confirm) {
        messageEl.textContent = "New password and confirmation do not match.";
        messageEl.classList.add("error");
        return;
      }

      const { token, type } = getSession();

      try {
        const res = await fetch(`${API_BASE}/auth/change_password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `${type} ${token}`,
          },
          body: JSON.stringify({
            current_password: current,
            new_password: next,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          messageEl.textContent = data.detail || data.message || "Password change failed.";
          messageEl.classList.add("error");
          return;
        }

        messageEl.textContent = data.message || "Password updated successfully.";
        messageEl.classList.add("success");

        // Clear mustChange flag locally
        localStorage.setItem("mustChangePassword", "0");

        // Redirect to appropriate dashboard after a short delay
        setTimeout(() => {
          const role = localStorage.getItem("userRole") || "user";
          if (role === "admin") {
          window.location.href = "/admin";
        } else if (role === "manager") {
          window.location.href = "/manager";
        } else {
          window.location.href = "/dashboard";
        }

        }, 800);
      } catch (err) {
        console.error(err);
        messageEl.textContent = "Unexpected error while changing password.";
        messageEl.classList.add("error");
      }
    });
  </script>
</body>
</html>
