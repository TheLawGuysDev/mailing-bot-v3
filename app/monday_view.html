<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/monday-sdk-js/dist/main.js"></script>
    <style>
        .container { padding: 20px; font-family: sans-serif; }
        .btn { padding: 10px; background: #0073ea; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Send Letter via Stannp</h3>
        <input type="file" id="letterFile" accept=".pdf">
        <button class="btn" onclick="sendLetter()">Send Now</button>
        <div id="status"></div>
    </div>

    <script>
        const monday = window.mondaySdk();
        
        async function sendLetter() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Processing...";
            
            try {
                // 1. Get current item ID from the monday context
                const context = await monday.get("context");
                const itemId = context.data.itemId;

                // 2. Call your FastAPI backend
                // Replace the URL with your actual ngrok or local address
                const response = await fetch('/integrations/monday/trigger-comment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item_id: itemId })
                });

                if (response.ok) {
                    statusDiv.innerText = "Success! Letter sent and comment posted.";
                } else {
                    statusDiv.innerText = "Error communicating with backend.";
                }
            } catch (error) {
                statusDiv.innerText = "An error occurred: " + error.message;
            }
        }
    </script>
</body>
</html>
